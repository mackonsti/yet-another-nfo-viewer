name: Build YaNVi application

on:
  push:
    branches: [ main ]
  release:
    types: [created]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode
      run: |
        sudo xcode-select -switch /Applications/Xcode.app
        echo "Effective Xcode ARCHS:"
        xcodebuild -showBuildSettings | grep ARCHS

    - name: Build application
      run: |
        xcodebuild \
          -scheme YaNVi \
          -configuration Release \
          -derivedDataPath build \
          -destination 'generic/platform=macOS' \
          ONLY_ACTIVE_ARCH=NO \
          clean build

    - name: Verify universal binary
      run: |
        BIN="build/Build/Products/Release/YaNVi.app/Contents/MacOS/YaNVi"
        echo "Main binary info:"
        ARCHS=$(lipo -info "$BIN")
        echo "$ARCHS"
        if [[ "$ARCHS" != *"x86_64"* ]] || [[ "$ARCHS" != *"arm64"* ]]; then
            echo "ERROR: Main binary is not universal (x86_64 + arm64 required)"
            exit 1
        fi
        echo "Application Mach-O details verified:"
        file "$BIN"

    - name: Verify QuickLook extension
      run: |
        QL_BIN="build/Build/Products/Release/YaNVi.app/Contents/PlugIns/YaNViQuickLook.appex/Contents/MacOS/YaNViQuickLook"
        echo "PlugIn binary info:"
        ARCHS=$(lipo -info "$QL_BIN")
        echo "$ARCHS"
        if [[ "$ARCHS" != *"x86_64"* ]] || [[ "$ARCHS" != *"arm64"* ]]; then
            echo "ERROR: PlugIn binary is not universal (x86_64 + arm64 required)"
            exit 1
        fi
        echo "QuickLook Mach-O details verified:"
        file "$QL_BIN"

    - name: Prepare artifacts
      run: |
        mkdir build_artifacts
        cp -R build/Build/Products/Release/YaNVi.app build_artifacts/

    - name: Set build version
      run: |
        if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION=${GITHUB_REF_NAME#v}
        else
            VERSION="dev-${GITHUB_SHA::7}"
        fi
        echo "VERSION=$VERSION" >> $GITHUB_ENV

    - name: Create DMG
      run: |
        DMG_NAME="YaNVi-${VERSION}-universal.dmg"
        echo "Creating DMG: $DMG_NAME"
        mkdir dmg
        cp -R build_artifacts/YaNVi.app dmg/
        ln -s /Applications dmg/Applications
        hdiutil create \
          -volname "YaNVi (U2B)" \
          -srcfolder dmg \
          -ov -format UDZO \
          "build_artifacts/$DMG_NAME"
        echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: YaNVi
        path: build_artifacts/${{ env.DMG_NAME }}

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build_artifacts/${{ env.DMG_NAME }}
