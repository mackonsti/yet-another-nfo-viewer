name: Build YaNVi application

on:
  push:
    branches: [ master ]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode.app

    - name: Build application
      run: |
        xcodebuild \
          -scheme YaNVi \
          -configuration Release \
          -arch x86_64 \
          -arch arm64 \
          -derivedDataPath build \
          clean build

    - name: Verify universal binary
      run: |
        lipo -info build/Build/Products/Release/YaNVi.app/Contents/MacOS/YaNVi

    - name: Prepare artifacts
      run: |
        mkdir build_artifacts
        cp -R build/Build/Products/Release/YaNVi.app build_artifacts/

    - name: Create DMG
      run: |
        hdiutil create \
          -volname "YaNVi" \
          -srcfolder build_artifacts/YaNVi.app \
          -ov -format UDZO \
          build_artifacts/YaNVi.dmg

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: YaNVi
        path: build_artifacts/YaNVi.dmg

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build_artifacts/YaNVi.dmg
