name: Build YaNVi application

on:
  push:
    branches: [ master ]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -switch /Applications/Xcode.app

    - name: Build application
      run: |
        xcodebuild \
          -scheme YaNVi \
          -configuration Release \
          -derivedDataPath build \
          -destination 'generic/platform=macOS' \
          ARCHS="x86_64 arm64" \
          VALID_ARCHS="x86_64 arm64" \
          ONLY_ACTIVE_ARCH=NO \
          clean build

    - name: Verify universal binary
      run: |
        BIN="build/Build/Products/Release/YaNVi.app/Contents/MacOS/YaNVi"
        echo "Binary info:"
        lipo -info "$BIN"
        ARCHS=$(lipo -info "$BIN")
        if [[ "$ARCHS" != *"x86_64"* ]] || [[ "$ARCHS" != *"arm64"* ]]; then
            echo "ERROR: Binary is not universal (x86_64 + arm64 required)"
            exit 1
        fi
        echo "Mach-O details verified:"
        file "$BIN"

    - name: Prepare artifacts
      run: |
        mkdir build_artifacts
        cp -R build/Build/Products/Release/YaNVi.app build_artifacts/

    - name: Create DMG
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        DMG_NAME="YaNVi-${VERSION}-universal.dmg"
        echo "Creating DMG: $DMG_NAME"
        mkdir dmg
        cp -R build_artifacts/YaNVi.app dmg/
        ln -s /Applications dmg/Applications
        hdiutil create \
          -volname "YaNVi (U2B)" \
          -srcfolder dmg \
          -ov -format UDZO \
          "build_artifacts/$DMG_NAME"
        echo "DMG_NAME=$DMG_NAME" >> $GITHUB_ENV

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: YaNVi
        path: build_artifacts/${{ env.DMG_NAME }}

    - name: Upload to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v2
      with:
        files: build_artifacts/${{ env.DMG_NAME }}
